name: Block ads update

on:
  workflow_dispatch:
    inputs:
      audit:
        description: 'Read-only inventory of current lists/policies (no changes)'
        type: boolean
        default: false
  # The twice-daily sync is triggered by a Cloudflare Worker cron
  # (focus-dns-toggle Worker's scheduled handler), NOT GitHub's own `schedule:`
  # trigger. GitHub's free scheduled runs were observed firing 3-5 HOURS late
  # (an 8:17 AM target ran at 11:34 AM), which no cron tuning fixes - it's a
  # best-effort free-tier queue. Cloudflare Worker cron triggers fire on time,
  # so the Worker sends a repository_dispatch at 8 AM & 6 PM Central and this
  # workflow runs from that. (workflow_dispatch above is kept for the app's
  # manual "Sync Now" button; the app labels repository_dispatch runs as the
  # automatic ones.)
  repository_dispatch:
    types: [scheduled-sync]

permissions:
  contents: write

jobs:
  block_ads_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run the script
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_ACTOR_ID: ${{ github.actor_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${{ github.event.inputs.audit }}" = "true" ]; then
            python3 block_ads.py --audit
          else
            python3 block_ads.py
          fi
