name: Block ads update

on:
  workflow_dispatch:
    inputs:
      audit:
        description: 'Read-only inventory of current lists/policies (no changes)'
        type: boolean
        default: false
  schedule:
    # Two entries bracketing the DST transition so the real target - ~5:00 AM Central -
    # is hit year-round: GitHub Actions cron is fixed UTC with no DST awareness, so
    # block_ads.py itself checks the actual America/Chicago wall clock and skips the
    # entry that doesn't land near 5 AM Central that day (see within_target_window()).
    - cron: '0 10 * * *'   # 5:00 AM Central during Daylight Time (CDT, UTC-5)
    - cron: '0 11 * * *'   # 5:00 AM Central during Standard Time (CST, UTC-6)

permissions:
  contents: write

jobs:
  block_ads_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run the script
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_ACTOR_ID: ${{ github.actor_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${{ github.event.inputs.audit }}" = "true" ]; then
            python3 block_ads.py --audit
          else
            python3 block_ads.py
          fi
